name: FreeServer 自动延长

on:
  schedule:
    - cron: '0 12 * * 5'   # 每周五北京时间 20:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🛡️ 启动 Gost 代理转发
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost

          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:8080 -F ${{ secrets.GOST_PROXY }} > gost.log 2>&1 &
          sleep 3

          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v

      - name: 🌐 Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 📦 Install dependencies
        env:
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080
          ALL_PROXY: http://127.0.0.1:8080
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run renew script
        env:
          FREESERVER_COOKIE: ${{ secrets.FREESERVER_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080
          ALL_PROXY: http://127.0.0.1:8080
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew_freeserver.py

      - name: 📸 Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeserver-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore

      - name: 📄 Upload gost log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gost-log
          path: gost.log
          if-no-files-found: ignore

      - name: ⏱️ Commit time.txt to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          date +"%Y-%m-%d %H:%M:%S" > time.txt
          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
